<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>🚦 Traffic Light Logger</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#0b0f14;color:#e7eef7}
    header{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;background:#0b0f14;z-index:10}
    h1{font-size:16px;margin:0 0 6px}
    .muted{color:#9bb0c8;font-size:12px}
    .wrap{padding:14px}
    .card{background:#0f1620;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;margin:10px 0}
    button{
      width:100%;
      font-size:20px;
      padding:18px 14px;
      margin:8px 0;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:#121a24;
      color:#e7eef7;
      cursor:pointer;
    }
    button.primary{background:#1a2a3d}
    button.red{background:#2a1620}
    button.green{background:#12301f}
    button:disabled{opacity:.55;cursor:not-allowed}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);font-size:12px}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .item{padding:10px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#0c121a}
    .itemTop{display:flex;justify-content:space-between;gap:8px}
    .small{font-size:12px;color:#9bb0c8}
    .danger{background:#2a1620}
    textarea{width:100%;min-height:120px;background:#0c121a;color:#e7eef7;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px;font-size:12px}
  </style>
</head>
<body>
<header>
  <h1>🚦 איסוף נתוני רמזורים (פרטי)</h1>
  <div class="muted">בלי שמות. רק לוחצים אדום → ירוק. הכל נשמר אוטומטי בטלפון.</div>
  <div class="row" style="margin-top:8px">
    <span class="pill">GPS: <span id="gpsStatus">לא פעיל</span></span>
    <span class="pill mono" id="gpsPos">—</span>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <button id="btnEnable" class="primary">📍 הפעל מיקום (פעם אחת)</button>

    <button id="btnRed" class="red" disabled>🔴 אדום התחיל</button>
    <button id="btnGreen" class="green" disabled>🟢 נהיה ירוק (סיום אדום)</button>

    <div class="muted" id="sessionInfo" style="margin-top:6px">מצב: מחכה</div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:800">📊 רשומות (האחרונות)</div>
        <div class="muted">כל רשומה = מיקום + משך אדום + זמן</div>
      </div>
      <div class="row">
        <button id="btnExport" style="width:auto;padding:10px 12px;font-size:14px">⬇️ Export</button>
        <button id="btnClear" class="danger" style="width:auto;padding:10px 12px;font-size:14px">🗑️ מחק הכל</button>
      </div>
    </div>
    <div id="list" class="list"></div>

    <details style="margin-top:10px">
      <summary class="muted">הצג JSON (לשליחה/גיבוי)</summary>
      <textarea id="jsonOut" readonly></textarea>
    </details>
  </div>
</div>

<script>
  const KEY = "tl_logger_v1";

  const el = (id)=>document.getElementById(id);
  const gpsStatus = el("gpsStatus");
  const gpsPos = el("gpsPos");
  const sessionInfo = el("sessionInfo");

  const btnEnable = el("btnEnable");
  const btnRed = el("btnRed");
  const btnGreen = el("btnGreen");

  const btnExport = el("btnExport");
  const btnClear = el("btnClear");
  const list = el("list");
  const jsonOut = el("jsonOut");

  let watchId = null;
  let lastFix = null; // {lat,lng,acc,speed,heading,ts}

  let redStartAt = null; // ms
  let redStartFix = null;

  function load(){
    try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
    catch { return []; }
  }
  function save(arr){
    localStorage.setItem(KEY, JSON.stringify(arr));
  }

  function fmt(ts){
    return new Date(ts).toLocaleString("he-IL", { year:"2-digit", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit" });
  }

  function render(){
    const rows = load();
    list.innerHTML = "";
    jsonOut.value = JSON.stringify(rows, null, 2);

    if(rows.length === 0){
      list.innerHTML = `<div class="muted">אין עדיין נתונים. לחץ "הפעל מיקום" ואז ברמזור: אדום → ירוק.</div>`;
      return;
    }

    rows.slice(0, 20).forEach((r)=>{
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div class="itemTop">
          <div>
            <div><b>${fmt(r.createdAt)}</b></div>
            <div class="small">אדום: <span class="mono">${r.redSec}s</span> · דיוק: <span class="mono">${Math.round(r.accuracy||0)}m</span></div>
            <div class="small mono">${r.lat.toFixed(6)}, ${r.lng.toFixed(6)}</div>
          </div>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function updateGpsUI(){
    if(!lastFix){
      gpsStatus.textContent = "לא פעיל";
      gpsPos.textContent = "—";
      return;
    }
    gpsStatus.textContent = "פעיל";
    gpsPos.textContent = `${lastFix.lat.toFixed(6)}, ${lastFix.lng.toFixed(6)} · ±${Math.round(lastFix.acc)}m`;
  }

  function enableGps(){
    if(!navigator.geolocation){
      alert("אין תמיכה ב-GPS בדפדפן הזה.");
      return;
    }
    gpsStatus.textContent = "מבקש הרשאה…";

    watchId = navigator.geolocation.watchPosition(
      (pos)=>{
        lastFix = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          acc: pos.coords.accuracy || null,
          speed: Number.isFinite(pos.coords.speed) ? pos.coords.speed : null,
          heading: Number.isFinite(pos.coords.heading) ? pos.coords.heading : null,
          ts: pos.timestamp || Date.now()
        };
        updateGpsUI();

        // מאפשרים כפתורים ברגע שיש fix ראשון
        btnRed.disabled = false;
        btnGreen.disabled = true;
        btnEnable.disabled = true;
        btnEnable.textContent = "✅ מיקום פעיל";
      },
      (err)=>{
        gpsStatus.textContent = "חסום/שגיאה";
        alert("לא הצלחתי לקבל מיקום. תן הרשאת מיקום ל-Chrome והפעל GPS.");
      },
      { enableHighAccuracy:true, maximumAge: 1500, timeout: 12000 }
    );
  }

  function startRed(){
    if(!lastFix) return alert("חכה שהמיקום יתעדכן (GPS).");
    redStartAt = Date.now();
    redStartFix = {...lastFix};
    sessionInfo.textContent = "מצב: 🔴 אדום התחיל… כשתהיה ירוק לחץ ירוק";
    btnRed.disabled = true;
    btnGreen.disabled = false;
  }

  function greenNow(){
    if(redStartAt == null) return;
    if(!lastFix) return alert("אין מיקום עדכני. נסה שוב.");

    const redSec = Math.max(1, Math.round((Date.now() - redStartAt)/1000));

    const record = {
      createdAt: Date.now(),
      redSec,
      lat: lastFix.lat,
      lng: lastFix.lng,
      accuracy: lastFix.acc,
      speed: lastFix.speed,
      heading: lastFix.heading,
      // שומרים גם את נקודת התחלת האדום (אם תרצה בעתיד)
      redStart: {
        at: redStartAt,
        lat: redStartFix.lat,
        lng: redStartFix.lng,
        accuracy: redStartFix.acc
      }
    };

    const rows = load();
    rows.unshift(record);
    save(rows);

    // איפוס מצב
    redStartAt = null;
    redStartFix = null;
    sessionInfo.textContent = `נשמר ✅ אדום ${redSec}s`;
    btnRed.disabled = false;
    btnGreen.disabled = true;

    render();
  }

  function exportJSON(){
    const data = load();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `traffic-lights-logs-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  btnEnable.addEventListener("click", enableGps);
  btnRed.addEventListener("click", startRed);
  btnGreen.addEventListener("click", greenNow);

  btnExport.addEventListener("click", exportJSON);
  btnClear.addEventListener("click", ()=>{
    if(confirm("למחוק את כל הנתונים שנאספו?")){
      localStorage.removeItem(KEY);
      render();
    }
  });

  render();
  updateGpsUI();
</script>
</body>
</html>
