<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Green Route</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

button{
font-size:22px;
padding:20px;
margin:10px;
border-radius:10px;
border:none;
background:#2ecc71;
color:white;
}
</style>
</head>

<body>

<h1>🚦 Green Route</h1>

<p>שמירת רמזורים בעיר</p>

<button onclick="saveLight()">שמור רמזור</button>

<button onclick="showLights()">רמזורים שמורים</button>

<script>

function saveLight(){

navigator.geolocation.getCurrentPosition(function(pos){

let lights = JSON.parse(localStorage.getItem("lights") || "[]")

lights.push({
lat:pos.coords.latitude,
lng:pos.coords.longitude
})

localStorage.setItem("lights",JSON.stringify(lights))

alert("הרמזור נשמר")

})

}

function showLights(){

let lights = JSON.parse(localStorage.getItem("lights") || "[]")

alert("נשמרו "+lights.length+" רמזורים")

}

</script>

</body>
</html>
