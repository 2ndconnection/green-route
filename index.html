<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Green Route – מדידת רמזורים</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; background: #0b0f14; color: #e8eef6; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 16px; }
    .card { background: #121a24; border: 1px solid #1f2b3a; border-radius: 16px; padding: 14px; margin-bottom: 12px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn {
      border: 0; border-radius: 14px; padding: 14px 16px; font-size: 18px; font-weight: 700;
      background: #2a3b52; color: #e8eef6;
    }
    .btn:active { transform: scale(0.99); }
    .btn-primary { background: #1c7c3a; }
    .btn-danger { background: #a33232; }
    .btn-ghost { background: transparent; border: 1px solid #2a3b52; }
    .big { width: 100%; padding: 18px 16px; font-size: 20px; border-radius: 16px; }
    .muted { color: #a9b6c6; font-size: 13px; line-height: 1.4; }
    .kv { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .kv > div { background: #0f1620; border: 1px solid #1f2b3a; border-radius: 12px; padding: 10px; }
    .k { color: #a9b6c6; font-size: 12px; }
    .v { font-size: 16px; font-weight: 700; margin-top: 4px; }
    .log { white-space: pre-wrap; background: #0f1620; border: 1px solid #1f2b3a; border-radius: 12px; padding: 10px; font-size: 12px; color: #cfe0f5; max-height: 200px; overflow: auto; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #0f1620; border: 1px solid #1f2b3a; color: #a9b6c6; font-size: 12px; }
    a { color: #7bb7ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 6px 0;">Green Route – מדידת זמן רמזור</h2>
      <div class="muted">
        כפתור אחד: מגיע לרמזור → לוחץ “התחל מדידה”.<br>
        ברגע שאתה נוסע מעל <b>10 קמ״ש</b> (יציב ~2 שניות) → נשמר אוטומטית.
      </div>
    </div>

    <div class="card">
      <button id="mainBtn" class="btn btn-primary big">התחל מדידה</button>
      <div style="margin-top:10px" class="row">
        <span id="statusPill" class="pill">מצב: מוכן</span>
        <span id="signalsPill" class="pill">טוען רמזורים…</span>
      </div>
    </div>

    <div class="card">
      <div class="kv">
        <div>
          <div class="k">רמזור מזוהה (ID)</div>
          <div id="sigId" class="v">—</div>
          <div class="muted" id="sigDist">מרחק: —</div>
        </div>
        <div>
          <div class="k">טיימר המתנה</div>
          <div id="timer" class="v">0 שנ׳</div>
          <div class="muted" id="speedLine">מהירות: —</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="exportBtn" class="btn btn-ghost">Export JSON</button>
        <button id="clearBtn" class="btn btn-danger">נקה מדידות</button>
      </div>
      <div class="muted" style="margin-top:10px">
        המדידות נשמרות בטלפון (localStorage). Export מוריד קובץ JSON.
      </div>
    </div>

    <div class="card">
      <div class="k">לוג</div>
      <div id="log" class="log"></div>
    </div>
  </div>

<script>
/* =========================
   Utilities
========================= */
const $ = (id) => document.getElementById(id);

function nowISO() { return new Date().toISOString(); }
function ms() { return Date.now(); }

function toRad(d){ return d * Math.PI/180; }
function haversineMeters(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = toRad(lat1), φ2 = toRad(lat2);
  const Δφ = toRad(lat2-lat1);
  const Δλ = toRad(lon2-lon1);
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function clampAngle180(a){
  // convert any angle to (-180..180)
  let x = ((a % 360) + 360) % 360;
  if (x > 180) x -= 360;
  return x;
}

function median(arr){
  if (!arr.length) return null;
  const s = [...arr].sort((a,b)=>a-b);
  const mid = Math.floor(s.length/2);
  return (s.length % 2) ? s[mid] : (s[mid-1]+s[mid])/2;
}

function avgCircularDegrees(degs){
  // average of angles
  if (!degs.length) return null;
  let x=0,y=0;
  for (const d of degs){
    const r = toRad(d);
    x += Math.cos(r);
    y += Math.sin(r);
  }
  const ang = Math.atan2(y,x) * 180/Math.PI;
  return ((ang % 360) + 360) % 360;
}

function log(msg){
  const line = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  $("log").textContent = line + $("log").textContent;
}

/* =========================
   Data store
========================= */
const STORE_KEY = "greenroute_measurements_v1";
function loadStore(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); }
  catch { return []; }
}
function saveStore(arr){
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
}

/* =========================
   Signals loading
========================= */
let signals = []; // {id, lon, lat}
async function loadSignals(){
  try{
    const res = await fetch("./data/signals.geojson", { cache: "no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const feats = (data && data.features) ? data.features : [];
    signals = feats
      .filter(f => f?.geometry?.type === "Point" && Array.isArray(f.geometry.coordinates))
      .map(f => {
        const [lon, lat] = f.geometry.coordinates;
        const sid =
          f.id ||
          f?.properties?.["@id"] ||
          f?.properties?.id ||
          f?.properties?.osm_id ||
          f?.properties?.ref ||
          "unknown";
        return { id: String(sid), lon: Number(lon), lat: Number(lat) };
      })
      .filter(s => Number.isFinite(s.lat) && Number.isFinite(s.lon));
    $("signalsPill").textContent = `רמזורים נטענו: ${signals.length}`;
    log(`Signals loaded: ${signals.length}`);
  }catch(e){
    $("signalsPill").textContent = "שגיאה בטעינת רמזורים";
    log(`ERROR loading signals: ${e.message}`);
  }
}

function findNearestSignal(lat, lon){
  if(!signals.length) return null;
  let best = null;
  let bestD = Infinity;
  // 916 נקודות זה קטן – ריצה ליניארית בסדר
  for (const s of signals){
    const d = haversineMeters(lat, lon, s.lat, s.lon);
    if (d < bestD){
      bestD = d;
      best = { ...s, distM: d };
    }
  }
  return best;
}

/* =========================
   Geolocation helpers
========================= */
let watchId = null;

let lastPos = null; // {lat, lon, t, speedMps?, heading?}
function computeSpeedMps(prev, cur){
  const dt = (cur.t - prev.t) / 1000;
  if (dt <= 0) return null;
  const d = haversineMeters(prev.lat, prev.lon, cur.lat, cur.lon);
  return d / dt;
}

function startWatch(){
  if (watchId !== null) return;
  if (!("geolocation" in navigator)){
    alert("המכשיר לא תומך GPS בדפדפן");
    return;
  }
  watchId = navigator.geolocation.watchPosition(
    (pos) => onPosition(pos),
    (err) => {
      log(`GPS ERROR: ${err.code} ${err.message}`);
      $("statusPill").textContent = "מצב: שגיאת GPS";
      if (err.code === 1) alert("צריך לאשר הרשאת מיקום כדי שזה יעבוד.");
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 15000
    }
  );
  log("GPS watch started");
}

function stopWatch(){
  if (watchId === null) return;
  navigator.geolocation.clearWatch(watchId);
  watchId = null;
  lastPos = null;
  log("GPS watch stopped");
}

function parsePos(pos){
  const c = pos.coords;
  const lat = c.latitude;
  const lon = c.longitude;
  const t = pos.timestamp ? Number(pos.timestamp) : ms();
  const accuracy = c.accuracy ?? null;
  const speedMps = (typeof c.speed === "number" && isFinite(c.speed)) ? c.speed : null;
  const heading = (typeof c.heading === "number" && isFinite(c.heading)) ? c.heading : null;
  return { lat, lon, t, accuracy, speedMps, heading };
}

/* =========================
   Measurement session (ONE BUTTON)
========================= */
const SPEED_END_KMH = 10;       // סיום אוטומטי
const SPEED_END_STABLE_MS = 2000; // יציב 2 שניות
const TURN_FOLLOW_MS = 5000;    // מעקב קצר אחרי יציאה כדי לנחש פנייה
const NEAR_SIGNAL_MAX_M = 80;   // אם רחוק יותר מזה – עדיין נשמור, אבל נסמן "רחוק"

let session = null;
/*
session = {
  startedAtMs,
  startISO,
  startLat, startLon, startAccuracy,
  nearest: {id,lat,lon,distM},
  headingBeforeArr: [],
  endSpeedStableSinceMs: null,
  samples: [],
  postMoveHeadings: [],
  finished: false
}
*/

function setMainButtonIdle(){
  $("mainBtn").textContent = "התחל מדידה";
  $("mainBtn").classList.remove("btn-danger");
  $("mainBtn").classList.add("btn-primary");
  $("statusPill").textContent = "מצב: מוכן";
}
function setMainButtonRunning(){
  $("mainBtn").textContent = "מודד… (לחיצה כדי לבטל)";
  $("mainBtn").classList.remove("btn-primary");
  $("mainBtn").classList.add("btn-danger");
  $("statusPill").textContent = "מצב: מודד";
}

function resetUIFields(){
  $("sigId").textContent = "—";
  $("sigDist").textContent = "מרחק: —";
  $("timer").textContent = "0 שנ׳";
  $("speedLine").textContent = "מהירות: —";
}

function startMeasurement(){
  if (session?.finished === false) return;
  if (!signals.length){
    alert("הרמזורים עדיין לא נטענו. חכה רגע ונסה שוב.");
    return;
  }
  session = {
    startedAtMs: ms(),
    startISO: nowISO(),
    startLat: null,
    startLon: null,
    startAccuracy: null,
    nearest: null,
    headingBeforeArr: [],
    endSpeedStableSinceMs: null,
    samples: [],
    postMoveHeadings: [],
    finished: false,
    followUntilMs: null
  };
  resetUIFields();
  setMainButtonRunning();
  startWatch();
  log("Measurement started (waiting for GPS fix...)");
}

function cancelMeasurement(){
  if (!session || session.finished) return;
  session.finished = true;
  setMainButtonIdle();
  resetUIFields();
  log("Measurement cancelled");
  // נשאיר GPS פועל? לא. נחסוך סוללה.
  stopWatch();
  session = null;
}

function finishMeasurement(reason){
  if (!session || session.finished) return;
  session.finished = true;

  const endedAtMs = ms();
  const waitSeconds = Math.max(0, Math.round((endedAtMs - session.startedAtMs)/1000));

  // Headings
  const headingBefore = avgCircularDegrees(session.headingBeforeArr.filter(x => x != null));
  const headingAfter  = avgCircularDegrees(session.postMoveHeadings.filter(x => x != null));

  let turn = "unknown";
  if (headingBefore != null && headingAfter != null){
    const delta = clampAngle180(headingAfter - headingBefore);
    const abs = Math.abs(delta);
    if (abs < 25) turn = "straight";
    else if (delta >= 25 && delta <= 120) turn = "right";
    else if (delta <= -25 && delta >= -120) turn = "left";
    else turn = "uncertain";
  }

  const nearest = session.nearest;
  const record = {
    createdAtISO: nowISO(),
    startISO: session.startISO,
    reason,
    waitSeconds,
    signal: nearest ? {
      id: nearest.id,
      lat: nearest.lat,
      lon: nearest.lon,
      distanceM: Math.round(nearest.distM)
    } : null,
    start: {
      lat: session.startLat,
      lon: session.startLon,
      accuracyM: session.startAccuracy
    },
    heading: {
      beforeDeg: headingBefore,
      afterDeg: headingAfter,
      turn
    },
    notes: {
      nearSignalMaxM: NEAR_SIGNAL_MAX_M,
      speedEndKmh: SPEED_END_KMH
    }
  };

  const store = loadStore();
  store.unshift(record);
  saveStore(store);

  log(`Saved: wait=${waitSeconds}s, signal=${nearest?.id || "none"}, dist=${nearest ? Math.round(nearest.distM) : "—"}m, turn=${turn}`);
  setMainButtonIdle();

  // עדכון UI מסכם
  $("timer").textContent = `${waitSeconds} שנ׳ (נשמר)`;
  if (nearest){
    $("sigId").textContent = nearest.id;
    $("sigDist").textContent = `מרחק: ${Math.round(nearest.distM)} מטר`;
  } else {
    $("sigId").textContent = "לא נמצא רמזור";
    $("sigDist").textContent = "מרחק: —";
  }

  // אחרי שמירה — מכבים GPS לחיסכון
  stopWatch();
  // משאירים session לסיכום רגע ואז מאפסים
  setTimeout(() => { session = null; }, 2000);
}

/* =========================
   GPS stream processing
========================= */
function onPosition(pos){
  const cur = parsePos(pos);

  // compute speed if missing
  let speedMps = cur.speedMps;
  if (speedMps == null && lastPos){
    const computed = computeSpeedMps(lastPos, {lat: cur.lat, lon: cur.lon, t: cur.t});
    if (computed != null && isFinite(computed)) speedMps = computed;
  }
  const speedKmh = (speedMps != null) ? (speedMps * 3.6) : null;

  // update lastPos
  lastPos = { lat: cur.lat, lon: cur.lon, t: cur.t, speedMps, heading: cur.heading };

  // UI speed line
  $("speedLine").textContent = `מהירות: ${speedKmh == null ? "—" : speedKmh.toFixed(1) + " קמ״ש"} | דיוק: ${cur.accuracy ? Math.round(cur.accuracy) + "m" : "—"}`;

  // If no session running, nothing else
  if (!session || session.finished) return;

  // First GPS fix for session
  if (session.startLat == null){
    session.startLat = cur.lat;
    session.startLon = cur.lon;
    session.startAccuracy = cur.accuracy ?? null;

    // Find nearest signal at start
    const nearest = findNearestSignal(cur.lat, cur.lon);
    session.nearest = nearest;

    if (nearest){
      $("sigId").textContent = nearest.id;
      $("sigDist").textContent = `מרחק: ${Math.round(nearest.distM)} מטר`;
      if (nearest.distM > NEAR_SIGNAL_MAX_M){
        log(`Nearest signal is far (${Math.round(nearest.distM)}m). Still measuring.`);
      } else {
        log(`Nearest signal: ${nearest.id} (${Math.round(nearest.distM)}m)`);
      }
    } else {
      $("sigId").textContent = "לא נמצא רמזור";
      $("sigDist").textContent = "מרחק: —";
      log("No signals available for nearest lookup.");
    }
  }

  // Timer update
  const elapsedS = Math.max(0, Math.round((ms() - session.startedAtMs)/1000));
  $("timer").textContent = `${elapsedS} שנ׳`;

  // Heading before: collect when speed is low (standing/creeping) or unknown
  if (cur.heading != null && (speedKmh == null || speedKmh < 8)){
    session.headingBeforeArr.push(cur.heading);
    if (session.headingBeforeArr.length > 25) session.headingBeforeArr.shift();
  }

  // Check finish condition: speed > SPEED_END_KMH stable for ~2s
  if (speedKmh != null && speedKmh >= SPEED_END_KMH){
    if (session.endSpeedStableSinceMs == null){
      session.endSpeedStableSinceMs = ms();
    }
    const stableFor = ms() - session.endSpeedStableSinceMs;

    // after movement starts, start follow-up window for turn detection
    if (session.followUntilMs == null){
      session.followUntilMs = ms() + TURN_FOLLOW_MS;
      log("Movement detected, collecting headings for turn...");
    }

    // collect post-move headings during follow-up window
    if (cur.heading != null && session.followUntilMs != null && ms() <= session.followUntilMs){
      session.postMoveHeadings.push(cur.heading);
      if (session.postMoveHeadings.length > 40) session.postMoveHeadings.shift();
    }

    if (stableFor >= SPEED_END_STABLE_MS){
      // Ensure we have at least some post headings, but don't block forever
      finishMeasurement("speed_threshold_reached");
    }
  } else {
    // if below threshold, reset stable timer
    session.endSpeedStableSinceMs = null;

    // also collect post headings only after movement window started
    if (session.followUntilMs != null && cur.heading != null && ms() <= session.followUntilMs){
      session.postMoveHeadings.push(cur.heading);
      if (session.postMoveHeadings.length > 40) session.postMoveHeadings.shift();
    }
  }

  // If follow-up window passed and we haven't finished yet (rare), finish anyway after window
  if (session.followUntilMs != null && ms() > session.followUntilMs && !session.finished){
    finishMeasurement("follow_window_elapsed");
  }
}

/* =========================
   UI events
========================= */
$("mainBtn").addEventListener("click", () => {
  if (!session) startMeasurement();
  else if (session && session.finished === false) cancelMeasurement();
});

$("exportBtn").addEventListener("click", () => {
  const data = loadStore();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `traffic-lights-log-${new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  log(`Exported ${data.length} records`);
});

$("clearBtn").addEventListener("click", () => {
  if (!confirm("למחוק את כל המדידות מהטלפון?")) return;
  saveStore([]);
  log("Cleared all records");
});

window.addEventListener("visibilitychange", () => {
  // אם עברת לאפליקציה אחרת בזמן מדידה — נבטל כדי שלא יהיה בלגן
  if (document.hidden && session && session.finished === false){
    log("Page hidden → cancelling measurement for safety");
    cancelMeasurement();
  }
});

/* =========================
   Init
========================= */
resetUIFields();
setMainButtonIdle();
loadSignals();
log("App ready. Tip: open via https (GitHub Pages) so GPS works.");
</script>

</body>
</html>
